<script>
async function openCompiler(githubRawUrl) {
    try {
        const response = await fetch(githubRawUrl);
        const code = await response.text();

        await navigator.clipboard.writeText(code);

        alert(
            "Kod skopiowany do schowka.\n" +
            "Kompiler się otworzy w nowej karcie.\n" +
            "Wklej kod za pomocą Ctrl+V."
        );

        window.open(
            "https://www.programiz.com/cpp-programming/online-compiler/",
            "_blank"
        );
    } catch (err) {
        alert("Failed to load code: " + err);
    }
}
</script>
